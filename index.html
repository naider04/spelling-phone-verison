<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Spelling Practice - Mobile Edition</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255,255,255,0.9);
      border-radius: 40px;
      padding: 20px 16px 35px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 1.8rem;
      color: #1e3c72;
      margin-bottom: 10px;
    }

    #word {
      font-size: 48px;
      font-weight: 800;
      background: #1e2a3a;
      display: inline-block;
      padding: 15px 25px;
      border-radius: 60px;
      color: #ffecb3;
      letter-spacing: 3px;
      margin: 15px 0;
      font-family: 'Courier New', monospace;
      word-break: break-word;
    }

    #heard {
      font-size: 20px;
      margin-top: 15px;
      padding: 12px 16px;
      background: #ffffffcc;
      border-radius: 50px;
      font-weight: 500;
      color: #0b2b3b;
      border: 1px solid #ffffffaa;
    }

    #liveTranscription {
      font-size: 18px;
      margin-top: 10px;
      padding: 10px 16px;
      background: #e8f0fe;
      border-radius: 50px;
      color: #1e3c72;
      border: 1px dashed #2c5f8a;
      font-family: monospace;
      word-break: break-word;
      min-height: 55px;
    }

    .status-badge {
      display: inline-block;
      background: #2c3e66;
      color: white;
      font-size: 14px;
      border-radius: 100px;
      padding: 5px 15px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    button {
      margin-top: 25px;
      font-size: 18px;
      padding: 10px 24px;
      background: #2c5f8a;
      border: none;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 #123456;
      transition: 0.07s linear;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #123456;
    }

    .mic-button {
      background: #1e6f3f;
      box-shadow: 0 4px 0 #0a3b22;
      font-size: 20px;
      padding: 14px 28px;
      margin-top: 10px;
    }

    .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      text-align: left;
      padding-left: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="status-badge">📱 SPELL & SPEAK (Mobile)</div>
  <h1>🔊 Spell the word</h1>
  <div id="word">-</div>
  
  <div class="label">🗣️ Real-time transcription:</div>
  <div id="liveTranscription">💬 Waiting for speech...</div>
  
  <div id="heard">🎤 Tap "Start Listening" to begin</div>
  
  <button id="startMicBtn" class="mic-button">🎙️ Start Listening</button>
  <br>
  <button onclick="resetListening()">🔄 New Word / Reset</button>
</div>

<script>
  // ================= WORD LIST (added improve and predicament) =================
  const words = [
    "Accurate", "Acknowledgment", "Acquaintance", "Activity", "Adventure", "Always",
    "Ambiguous", "Answer", "Anxious", "Apprehensive", "Architecture", "Articulate",
    "Assertive", "Assimilate", "Astonishing", "Autonomous", "Balance", "Benevolent",
    "Between", "Biochemistry", "Book", "Bored", "Bottle", "Boy", "Break", "Brevity",
    "Calendar", "Camouflage", "Camouflage", "Capricious", "Career", "Challenge",
    "Children", "Close", "Coherence", "Colloquial", "Complete", "Compliance",
    "Computer", "Conscientious", "Conscientious", "Control", "Controversial",
    "Controversial", "Convoluted", "Country", "Curious", "Decide", "Dehydration",
    "Dilemma", "Disappearance", "Discover", "Discrepancy", "Divulge", "Eloquent",
    "Embarrassing", "Empirical", "Encounter", "Energy", "Enigmatic", "Environmentally",
    "Ephemeral", "Exaggeration", "Face", "Fairness", "Famous", "Father", "Feel",
    "Filmmaker", "Finger", "Flabbergasted", "Flower", "Focus", "Foster", "Friend",
    "Gate", "Gather", "Handkerchief", "Help", "Honest", "Hypothetical", "Hypothetical",
    "Imagine", "Impeccable", "Importune", "Improve", "Independence", "Indispensable",
    "Ineffable", "Irreplaceable", "Journey", "Judgemental", "Knowledge", "Knowledgeable",
    "Language", "Look", "Make", "Member", "Message", "Meticulous", "Misunderstood",
    "Monday", "Movie", "Nature", "Near", "Neighborhood", "Night", "Notebook", "Notice",
    "Observe", "Obsolete", "Often", "Outside", "Overwhelming", "Package", "Paradox",
    "Patient", "Pencil", "People", "Perfect", "Perseverance", "Plausible", "Play",
    "Please", "Popular", "Potato", "Practice", "Pragmatic", "Predicament", "Prepare",
    "Present", "Protect", "Provide", "Psychologist", "Quarantine", "Quickly", "Reason",
    "Recommendable", "Redundant", "Reiterate", "Resilient", "Respect", "Result", "Rich",
    "School", "Secret", "Serious", "Shoes", "Small", "Sophisticated", "Speak", "Special",
    "Spontaneous", "Spoon", "Sport", "Strong", "Student", "Subtle", "Suggest", "Talent",
    "Taxonomy", "Teacher", "Think", "Travel", "Tree", "Unbelievable", "Unnecessary",
    "Useful", "Vacation", "Wash", "Water", "Welcome", "Wisdom", "Yesterday"
  ];

  const variants = {
    "practice": ["practice","practise"],
    "improve": ["improve"],
    "predicament": ["predicament"]
  };

  let currentWord = getRandomWord();
  let recognition = null;
  let listeningActive = false;
  let resetGuard = false;

  const wordElement = document.getElementById("word");
  const heardElement = document.getElementById("heard");
  const liveTranscriptionElement = document.getElementById("liveTranscription");
  wordElement.innerText = currentWord;

  function getRandomWord() {
    return words[Math.floor(Math.random() * words.length)];
  }

  // ========== ENHANCED PHONETIC CONFUSION GROUPS ==========
  // Groups of letters that sound similar (expanded for better recognition)
  function getConfusionGroup(letter) {
    const groups = {
      'b': ['b', 'p', 'v', 'd'],
      'p': ['p', 'b', 'v', 'd'],
      'v': ['v', 'b', 'p', 'd'],
      'd': ['d', 't', 'v', 'b'],
      't': ['t', 'd'],
      'm': ['m', 'n'],
      'n': ['n', 'm'],
      'f': ['f', 'v'],
      'c': ['c', 'k', 'q'],
      'k': ['k', 'c', 'q'],
      'q': ['q', 'c', 'k'],
      's': ['s', 'z'],
      'z': ['z', 's'],
      'g': ['g', 'j'],
      'j': ['j', 'g']
    };
    return groups[letter] || [letter];
  }

  function isSimilarLetter(a, b) {
    if (a === b) return true;
    const groupA = getConfusionGroup(a);
    return groupA.includes(b);
  }

  function compareLetterSequences(spoken, target) {
    if (spoken.length !== target.length) return false;
    for (let i = 0; i < spoken.length; i++) {
      if (!isSimilarLetter(spoken[i], target[i])) return false;
    }
    return true;
  }

  // ========== ENHANCED NORMALIZATION ==========
  function normalizeText(str) {
    return str.toLowerCase().trim().replace(/[^a-z]/g, '');
  }

  // Special handling for "i am" + letters and "im" + letters
  function handleImPattern(transcript, targetWord) {
    const lowerTarget = targetWord.toLowerCase();
    
    // Pattern 1: "i am p r o v e" → "improve"
    const iamMatch = transcript.match(/^\s*i\s+am\s+(.+)$/i);
    if (iamMatch) {
      let afterIam = iamMatch[1].trim();
      let letters = afterIam.split(/\s+/).map(part => part[0].toLowerCase()).join('');
      let expectedLetters = lowerTarget.substring(2); // remove "im"
      if (compareLetterSequences(letters.split(''), expectedLetters.split(''))) {
        return true;
      }
    }
    
    // Pattern 2: "i m p r o v e" (letters only, no "am")
    const imMatch = transcript.match(/^\s*i\s+m\s+(.+)$/i);
    if (imMatch) {
      let afterIm = imMatch[1].trim();
      let letters = afterIm.split(/\s+/).map(part => part[0].toLowerCase()).join('');
      let expectedLetters = lowerTarget.substring(2); // remove "im"
      if (compareLetterSequences(letters.split(''), expectedLetters.split(''))) {
        return true;
      }
    }
    
    return false;
  }

  // Handle generic patterns like "the a c c u r a t e" → "accurate"
  function handleThePattern(transcript, targetWord) {
    const theMatch = transcript.match(/^\s*the\s+(.+)$/i);
    if (theMatch) {
      let afterThe = theMatch[1].trim();
      let letters = afterThe.split(/\s+/).map(part => part[0].toLowerCase()).join('');
      let expectedLetters = targetWord.toLowerCase();
      if (compareLetterSequences(letters.split(''), expectedLetters.split(''))) {
        return true;
      }
    }
    return false;
  }

  // Handle generic letter-by-letter spelling with possible "the" at beginning
  function handleLetterByLetterSpelling(transcript, targetWord) {
    // Remove any leading "the" if present
    let cleanTranscript = transcript.replace(/^\s*the\s+/i, '').trim();
    let spokenLetters = cleanTranscript.split(/\s+/).map(part => part[0].toLowerCase());
    let targetLetters = targetWord.toLowerCase().split('');
    
    if (spokenLetters.length === targetLetters.length) {
      if (compareLetterSequences(spokenLetters, targetLetters)) {
        return true;
      }
    }
    
    return false;
  }

  // Letter name mapping (bee → b, cee → c, etc.)
  function decodeLetterNames(transcript) {
    const letterMap = {
      "bee":"b", "cee":"c", "dee":"d", "gee":"g", "jay":"j", "kay":"k",
      "pee":"p", "cue":"q", "are":"r", "ess":"s", "tee":"t", "you":"u",
      "vee":"v", "double":"w", "ex":"x", "why":"y", "zee":"z", "zed":"z",
      "aitch":"h", "en":"n", "em":"m", "oh":"o", "eff":"f", "ell":"l", "eye":"i", "see":"c",
      "double-u":"w"
    };
    
    let words = transcript.toLowerCase().split(/\s+/);
    let decoded = words.map(w => letterMap[w] || w).join('');
    return decoded;
  }

  // ========== MAIN MATCHING FUNCTION ==========
  function isSpellingMatch(transcript, targetWord) {
    let possibleTargets = variants[targetWord.toLowerCase()] || [targetWord];
    let cleanTranscriptFull = transcript.toLowerCase().trim();
    
    for (let tgt of possibleTargets) {
      let lowerTgt = tgt.toLowerCase();
      
      // 1. Direct exact match
      if (normalizeText(cleanTranscriptFull) === lowerTgt) return true;
      
      // 2. "i am p r o v e" or "i m p r o v e" pattern for words starting with "im"
      if (lowerTgt.startsWith('im') && handleImPattern(cleanTranscriptFull, lowerTgt)) {
        return true;
      }
      
      // 3. "the a c c u r a t e" pattern for any word
      if (handleThePattern(cleanTranscriptFull, lowerTgt)) {
        return true;
      }
      
      // 4. Simple letter-by-letter spelling (each word's first letter)
      if (handleLetterByLetterSpelling(cleanTranscriptFull, lowerTgt)) {
        return true;
      }
      
      // 5. Letter name decoding (bee, cee, dee, etc.)
      let decodedLetters = decodeLetterNames(cleanTranscriptFull);
      if (normalizeText(decodedLetters) === lowerTgt) return true;
      
      // 6. Direct letter sequence comparison (no spaces)
      let spokenLettersNoSpaces = cleanTranscriptFull.replace(/\s+/g, '').toLowerCase();
      if (spokenLettersNoSpaces.length === lowerTgt.length) {
        if (compareLetterSequences(spokenLettersNoSpaces.split(''), lowerTgt.split(''))) {
          return true;
        }
      }
      
      // 7. First letters of words in transcript (flexible pattern with possible "the")
      let wordsOnly = cleanTranscriptFull.split(/\s+/);
      // Skip first word if it's "the" for this check too
      let startIdx = (wordsOnly[0] === 'the') ? 1 : 0;
      let extracted = wordsOnly.slice(startIdx).map(w => w[0]).join('');
      if (extracted.length === lowerTgt.length) {
        if (compareLetterSequences(extracted.split(''), lowerTgt.split(''))) {
          return true;
        }
      }
    }
    
    return false;
  }

  // ========== START LISTENING ==========
  function startListening() {
    if (resetGuard) return;
    
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      listeningActive = false;
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      heardElement.innerText = "❌ Your browser doesn't support voice recognition. Try Chrome or Safari.";
      liveTranscriptionElement.innerText = "❌ Browser not supported";
      return;
    }
    
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = true;
    recognition.continuous = false;
    
    recognition.onstart = () => {
      listeningActive = true;
      heardElement.innerText = "🎤 Listening... Speak the spelling";
      liveTranscriptionElement.innerText = "💬 Say each letter...";
    };
    
    recognition.onresult = (event) => {
      let finalTranscript = "";
      let interimTranscript = "";
      
      for (let i = 0; i < event.results.length; i++) {
        let result = event.results[i];
        if (result.isFinal) {
          finalTranscript += result[0].transcript;
        } else {
          interimTranscript += result[0].transcript;
        }
      }
      
      let fullText = (interimTranscript + finalTranscript).toLowerCase().trim();
      if (fullText) {
        liveTranscriptionElement.innerHTML = "🗣️ " + fullText;
      } else {
        liveTranscriptionElement.innerHTML = "💬 Listening...";
      }
      
      if (finalTranscript) {
        let transcript = finalTranscript.toLowerCase().trim();
        heardElement.innerHTML = "👂 \"" + transcript + "\"";
        
        if (isSpellingMatch(transcript, currentWord)) {
          heardElement.innerHTML = "✅ Correct! Next word...";
          liveTranscriptionElement.innerHTML = "🎉 Correct! Getting new word...";
          currentWord = getRandomWord();
          wordElement.innerText = currentWord;
          
          if (recognition) {
            recognition.stop();
            listeningActive = false;
          }
          setTimeout(() => {
            if (!resetGuard) startListening();
          }, 500);
        } else {
          // Show hint with expected spelling pattern
          let hint = currentWord.split('').join(' ');
          if (currentWord.toLowerCase().startsWith('im')) {
            hint = "Try: i am " + currentWord.substring(2).split('').join(' ') + " or just spell the letters";
          }
          heardElement.innerHTML = "❌ Try again. Say: " + hint;
          setTimeout(() => {
            if (listeningActive && !resetGuard && recognition) {
              try { recognition.start(); } catch(e) {}
            }
          }, 1200);
        }
      }
    };
    
    recognition.onerror = (e) => {
      console.log(e.error);
      if (e.error === 'not-allowed') {
        heardElement.innerText = "🎤 Microphone access denied. Please allow mic and try again.";
        liveTranscriptionElement.innerText = "❌ Microphone access required";
      } else if (e.error === 'no-speech') {
        heardElement.innerText = "🎤 No speech heard. Tap and speak clearly.";
        liveTranscriptionElement.innerText = "💬 No speech detected";
      } else {
        heardElement.innerText = "🎤 Mic error. Tap Start again.";
        liveTranscriptionElement.innerText = "⚠️ Error, please try again";
      }
      listeningActive = false;
    };
    
    recognition.onend = () => {
      if (listeningActive && !resetGuard) {
        setTimeout(() => {
          if (listeningActive && !resetGuard && recognition) {
            try { recognition.start(); } catch(e) {}
          }
        }, 200);
      } else if (!resetGuard && !listeningActive) {
        liveTranscriptionElement.innerText = "💬 Ready. Tap Start to spell.";
      }
    };
    
    recognition.start();
  }
  
  // ========== RESET FUNCTION ==========
  function resetListening() {
    resetGuard = true;
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      listeningActive = false;
    }
    heardElement.innerText = "🔄 Resetting...";
    liveTranscriptionElement.innerText = "💬 Resetting...";
    setTimeout(() => {
      currentWord = getRandomWord();
      wordElement.innerText = currentWord;
      resetGuard = false;
      listeningActive = false;
      startListening();
    }, 200);
  }
  
  // ========== INITIALIZATION ==========
  document.getElementById("startMicBtn").addEventListener("click", () => {
    if (listeningActive && recognition) {
      heardElement.innerText = "🎤 Already listening!";
      return;
    }
    startListening();
  });
  
  heardElement.innerText = "🎤 Tap 'Start Listening' and spell the word letter by letter";
  liveTranscriptionElement.innerText = "💬 Ready. Tap Start to spell.";
</script>
</body>
</html>
