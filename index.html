<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Spelling Practice - Mobile Edition</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255,255,255,0.9);
      border-radius: 40px;
      padding: 20px 16px 35px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 1.8rem;
      color: #1e3c72;
      margin-bottom: 10px;
    }

    #word {
      font-size: 48px;
      font-weight: 800;
      background: #1e2a3a;
      display: inline-block;
      padding: 15px 25px;
      border-radius: 60px;
      color: #ffecb3;
      letter-spacing: 3px;
      margin: 15px 0;
      font-family: 'Courier New', monospace;
      word-break: break-word;
    }

    #heard {
      font-size: 20px;
      margin-top: 15px;
      padding: 12px 16px;
      background: #ffffffcc;
      border-radius: 50px;
      font-weight: 500;
      color: #0b2b3b;
      border: 1px solid #ffffffaa;
    }

    #liveTranscription {
      font-size: 18px;
      margin-top: 10px;
      padding: 10px 16px;
      background: #e8f0fe;
      border-radius: 50px;
      color: #1e3c72;
      border: 1px dashed #2c5f8a;
      font-family: monospace;
      word-break: break-word;
      min-height: 55px;
    }

    #transcriptionHistory {
      font-size: 20px;
      margin-top: 15px;
      padding: 15px;
      background: #fff8e7;
      border-radius: 30px;
      color: #2c3e66;
      border: 2px solid #ffd966;
      font-family: monospace;
      word-break: break-word;
      min-height: 80px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .status-badge {
      display: inline-block;
      background: #2c3e66;
      color: white;
      font-size: 14px;
      border-radius: 100px;
      padding: 5px 15px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    button {
      margin-top: 25px;
      font-size: 18px;
      padding: 10px 24px;
      background: #2c5f8a;
      border: none;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 #123456;
      transition: 0.07s linear;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #123456;
    }

    .mic-button {
      background: #1e6f3f;
      box-shadow: 0 4px 0 #0a3b22;
      font-size: 20px;
      padding: 14px 28px;
      margin-top: 10px;
    }

    .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      text-align: left;
      padding-left: 10px;
    }

    .clear-btn {
      background: #8b5e3c;
      box-shadow: 0 4px 0 #5a3a22;
      font-size: 14px;
      padding: 8px 16px;
      margin-top: 10px;
      margin-left: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="status-badge">📱 SPELL & SPEAK (Mobile)</div>
  <h1>🔊 Spell the word</h1>
  <div id="word">-</div>
  
  <div class="label">📝 Your spelling attempt (builds over time):</div>
  <div id="transcriptionHistory">💬 Nothing said yet...</div>
  
  <div class="label">🗣️ Live transcription (interim):</div>
  <div id="liveTranscription">💬 Waiting for speech...</div>
  
  <div id="heard">🎤 Tap "Start Listening" to begin</div>
  
  <button id="startMicBtn" class="mic-button">🎙️ Start Listening</button>
  <button id="clearHistoryBtn" class="clear-btn">🗑️ Clear History</button>
  <br>
  <button onclick="resetListening()">🔄 New Word / Reset</button>
</div>

<script>
  // ================= WORD LIST =================
  const words = [
    "Accurate", "Book", "Computer", "Friend", "Language",
    "Practice", "School", "Teacher", "Water", "Wisdom",
    "Improve", "Predicament"
  ];

  const variants = {
    "practice": ["practice","practise"],
    "improve": ["improve"],
    "predicament": ["predicament"]
  };

  let currentWord = getRandomWord();
  let recognition = null;
  let listeningActive = false;
  let resetGuard = false;
  
  // Store accumulated transcription for the current attempt
  let accumulatedText = "";

  const wordElement = document.getElementById("word");
  const heardElement = document.getElementById("heard");
  const liveTranscriptionElement = document.getElementById("liveTranscription");
  const transcriptionHistoryElement = document.getElementById("transcriptionHistory");
  
  wordElement.innerText = currentWord;

  function getRandomWord() {
    return words[Math.floor(Math.random() * words.length)];
  }

  // Clear accumulated history
  function clearHistory() {
    accumulatedText = "";
    transcriptionHistoryElement.innerHTML = "💬 Nothing said yet...";
    liveTranscriptionElement.innerHTML = "💬 History cleared";
    setTimeout(() => {
      if (!listeningActive) {
        liveTranscriptionElement.innerHTML = "💬 Waiting for speech...";
      }
    }, 1000);
  }

  // ========== ENHANCED PHONETIC CONFUSION GROUPS ==========
  function getConfusionGroup(letter) {
    const groups = {
      'b': ['b', 'p', 'v', 'd'],
      'p': ['p', 'b', 'v', 'd'],
      'v': ['v', 'b', 'p', 'd'],
      'd': ['d', 't', 'v', 'b'],
      't': ['t', 'd'],
      'm': ['m', 'n'],
      'n': ['n', 'm'],
      'f': ['f', 'v'],
      'c': ['c', 'k', 'q'],
      'k': ['k', 'c', 'q'],
      'q': ['q', 'c', 'k'],
      's': ['s', 'z'],
      'z': ['z', 's'],
      'g': ['g', 'j'],
      'j': ['j', 'g']
    };
    return groups[letter] || [letter];
  }

  function isSimilarLetter(a, b) {
    if (a === b) return true;
    const groupA = getConfusionGroup(a);
    return groupA.includes(b);
  }

  function compareLetterSequences(spoken, target) {
    if (spoken.length !== target.length) return false;
    for (let i = 0; i < spoken.length; i++) {
      if (!isSimilarLetter(spoken[i], target[i])) return false;
    }
    return true;
  }

  function normalizeText(str) {
    return str.toLowerCase().trim().replace(/[^a-z]/g, '');
  }

  function handleImPattern(transcript, targetWord) {
    const lowerTarget = targetWord.toLowerCase();
    
    const iamMatch = transcript.match(/^\s*i\s+am\s+(.+)$/i);
    if (iamMatch) {
      let afterIam = iamMatch[1].trim();
      let letters = afterIam.split(/\s+/).map(part => part[0].toLowerCase()).join('');
      let expectedLetters = lowerTarget.substring(2);
      if (compareLetterSequences(letters.split(''), expectedLetters.split(''))) {
        return true;
      }
    }
    
    const imMatch = transcript.match(/^\s*i\s+m\s+(.+)$/i);
    if (imMatch) {
      let afterIm = imMatch[1].trim();
      let letters = afterIm.split(/\s+/).map(part => part[0].toLowerCase()).join('');
      let expectedLetters = lowerTarget.substring(2);
      if (compareLetterSequences(letters.split(''), expectedLetters.split(''))) {
        return true;
      }
    }
    
    return false;
  }

  function handleThePattern(transcript, targetWord) {
    const theMatch = transcript.match(/^\s*the\s+(.+)$/i);
    if (theMatch) {
      let afterThe = theMatch[1].trim();
      let letters = afterThe.split(/\s+/).map(part => part[0].toLowerCase()).join('');
      let expectedLetters = targetWord.toLowerCase();
      if (compareLetterSequences(letters.split(''), expectedLetters.split(''))) {
        return true;
      }
    }
    return false;
  }

  function handleLetterByLetterSpelling(transcript, targetWord) {
    let cleanTranscript = transcript.replace(/^\s*the\s+/i, '').trim();
    let spokenLetters = cleanTranscript.split(/\s+/).map(part => part[0].toLowerCase());
    let targetLetters = targetWord.toLowerCase().split('');
    
    if (spokenLetters.length === targetLetters.length) {
      if (compareLetterSequences(spokenLetters, targetLetters)) {
        return true;
      }
    }
    
    return false;
  }

  function decodeLetterNames(transcript) {
    const letterMap = {
      "bee":"b", "cee":"c", "dee":"d", "gee":"g", "jay":"j", "kay":"k",
      "pee":"p", "cue":"q", "are":"r", "ess":"s", "tee":"t", "you":"u",
      "vee":"v", "double":"w", "ex":"x", "why":"y", "zee":"z", "zed":"z",
      "aitch":"h", "en":"n", "em":"m", "oh":"o", "eff":"f", "ell":"l", "eye":"i", "see":"c",
      "double-u":"w"
    };
    
    let words = transcript.toLowerCase().split(/\s+/);
    let decoded = words.map(w => letterMap[w] || w).join('');
    return decoded;
  }

  function isSpellingMatch(transcript, targetWord) {
    let possibleTargets = variants[targetWord.toLowerCase()] || [targetWord];
    let cleanTranscriptFull = transcript.toLowerCase().trim();
    
    for (let tgt of possibleTargets) {
      let lowerTgt = tgt.toLowerCase();
      
      if (normalizeText(cleanTranscriptFull) === lowerTgt) return true;
      
      if (lowerTgt.startsWith('im') && handleImPattern(cleanTranscriptFull, lowerTgt)) {
        return true;
      }
      
      if (handleThePattern(cleanTranscriptFull, lowerTgt)) {
        return true;
      }
      
      if (handleLetterByLetterSpelling(cleanTranscriptFull, lowerTgt)) {
        return true;
      }
      
      let decodedLetters = decodeLetterNames(cleanTranscriptFull);
      if (normalizeText(decodedLetters) === lowerTgt) return true;
      
      let spokenLettersNoSpaces = cleanTranscriptFull.replace(/\s+/g, '').toLowerCase();
      if (spokenLettersNoSpaces.length === lowerTgt.length) {
        if (compareLetterSequences(spokenLettersNoSpaces.split(''), lowerTgt.split(''))) {
          return true;
        }
      }
      
      let wordsOnly = cleanTranscriptFull.split(/\s+/);
      let startIdx = (wordsOnly[0] === 'the') ? 1 : 0;
      let extracted = wordsOnly.slice(startIdx).map(w => w[0]).join('');
      if (extracted.length === lowerTgt.length) {
        if (compareLetterSequences(extracted.split(''), lowerTgt.split(''))) {
          return true;
        }
      }
    }
    
    return false;
  }

  // ========== START LISTENING WITH ACCUMULATION ==========
  function startListening() {
    if (resetGuard) return;
    
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      listeningActive = false;
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      heardElement.innerText = "❌ Your browser doesn't support voice recognition. Try Chrome or Safari.";
      liveTranscriptionElement.innerText = "❌ Browser not supported";
      return;
    }
    
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = true;
    recognition.continuous = true; // Changed to true for continuous listening
    
    recognition.onstart = () => {
      listeningActive = true;
      heardElement.innerText = "🎤 Listening... Speak the spelling (stay silent to finalize each chunk)";
      liveTranscriptionElement.innerText = "💬 Say something...";
    };
    
    recognition.onresult = (event) => {
      let finalTranscript = "";
      let interimTranscript = "";
      
      for (let i = 0; i < event.results.length; i++) {
        let result = event.results[i];
        if (result.isFinal) {
          finalTranscript += result[0].transcript;
        } else {
          interimTranscript += result[0].transcript;
        }
      }
      
      // Show interim results (real-time)
      if (interimTranscript) {
        liveTranscriptionElement.innerHTML = "🎤 Speaking: " + interimTranscript.toLowerCase();
      } else {
        liveTranscriptionElement.innerHTML = "💬 Waiting...";
      }
      
      // When we get final transcript, APPEND it to accumulated text
      if (finalTranscript) {
        let cleanFinal = finalTranscript.toLowerCase().trim();
        
        // Append to accumulated text (add space if needed)
        if (accumulatedText) {
          accumulatedText += " " + cleanFinal;
        } else {
          accumulatedText = cleanFinal;
        }
        
        // Update the history display
        transcriptionHistoryElement.innerHTML = "📝 " + accumulatedText;
        
        // Check if the accumulated text matches the word
        if (isSpellingMatch(accumulatedText, currentWord)) {
          heardElement.innerHTML = "✅ Correct! Next word...";
          transcriptionHistoryElement.innerHTML = "🎉 CORRECT! Moving to next word...";
          liveTranscriptionElement.innerHTML = "🎉 Correct! Getting new word...";
          
          currentWord = getRandomWord();
          wordElement.innerText = currentWord;
          
          // Clear accumulated text for the new word
          accumulatedText = "";
          transcriptionHistoryElement.innerHTML = "💬 New word. Start spelling...";
          
          if (recognition) {
            recognition.stop();
            listeningActive = false;
          }
          setTimeout(() => {
            if (!resetGuard) startListening();
          }, 800);
        } else {
          // Don't clear the history - keep building
          heardElement.innerHTML = "👂 Added: \"" + cleanFinal + "\" | Keep going or tap reset to start over";
          liveTranscriptionElement.innerHTML = "✅ Added to history. Keep spelling...";
          
          // Reset interim display after a moment
          setTimeout(() => {
            if (listeningActive) {
              liveTranscriptionElement.innerHTML = "💬 Listening for more...";
            }
          }, 1500);
        }
      }
    };
    
    recognition.onerror = (e) => {
      console.log(e.error);
      if (e.error === 'not-allowed') {
        heardElement.innerText = "🎤 Microphone access denied. Please allow mic and try again.";
        liveTranscriptionElement.innerText = "❌ Microphone access required";
      } else if (e.error === 'no-speech') {
        heardElement.innerText = "🎤 No speech heard. Tap and speak clearly.";
        liveTranscriptionElement.innerHTML = "💬 No speech detected - try again";
      } else {
        heardElement.innerText = "🎤 Mic error. Tap Start again.";
        liveTranscriptionElement.innerHTML = "⚠️ Error, please try again";
      }
      listeningActive = false;
    };
    
    recognition.onend = () => {
      if (listeningActive && !resetGuard) {
        setTimeout(() => {
          if (listeningActive && !resetGuard && recognition) {
            try { recognition.start(); } catch(e) {}
          }
        }, 300);
      } else if (!resetGuard && !listeningActive && !accumulatedText) {
        liveTranscriptionElement.innerHTML = "💬 Ready. Tap Start to spell.";
      }
    };
    
    recognition.start();
  }
  
  // ========== RESET FUNCTION ==========
  function resetListening() {
    resetGuard = true;
    if (recognition) {
      try { recognition.stop(); } catch(e) {}
      listeningActive = false;
    }
    heardElement.innerText = "🔄 Resetting...";
    liveTranscriptionElement.innerHTML = "💬 Resetting...";
    transcriptionHistoryElement.innerHTML = "💬 Clearing history...";
    
    setTimeout(() => {
      currentWord = getRandomWord();
      wordElement.innerText = currentWord;
      accumulatedText = ""; // Clear accumulated text
      transcriptionHistoryElement.innerHTML = "💬 Nothing said yet...";
      resetGuard = false;
      listeningActive = false;
      startListening();
    }, 200);
  }
  
  // ========== INITIALIZATION ==========
  document.getElementById("startMicBtn").addEventListener("click", () => {
    if (listeningActive && recognition) {
      heardElement.innerText = "🎤 Already listening!";
      return;
    }
    // Reset accumulated text when starting fresh
    accumulatedText = "";
    transcriptionHistoryElement.innerHTML = "💬 Nothing said yet...";
    startListening();
  });
  
  document.getElementById("clearHistoryBtn").addEventListener("click", () => {
    clearHistory();
  });
  
  heardElement.innerText = "🎤 Tap 'Start Listening' and spell the word letter by letter";
  liveTranscriptionElement.innerHTML = "💬 Ready. Tap Start to spell.";
  transcriptionHistoryElement.innerHTML = "💬 Nothing said yet...";
</script>
</body>
</html>
